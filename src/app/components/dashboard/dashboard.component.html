<ng-container *ngIf="vm$ | async as vm">
  <app-control-bar
    class="control-bar"
    [engineState]="vm.engineState"
    [pacerDelay]="vm.strategy.pacerDelay"
    (onRun)="facade.run()"
    (onStep)="facade.step()"
    (onPause)="facade.pause()"
    (onReset)="facade.reset()"
    (onSpeedChange)="facade.setSpeed($event)">
  </app-control-bar>

  <app-domain-console
    class="left-sidebar"
    [entityTypes]="vm.entityTypes"
    [domainError]="vm.domainError"
    [weights]="vm.strategy.weights"
    (onLoadDomain)="handleLoadDomain($event)"
    (onSaveDomain)="handleSaveDomain()"
    (onSeedFinding)="facade.seedFinding($event.label, $event.type)"
    (onResetOnLoadChange)="resetOnLoad = $event"
    (onWeightsChange)="facade.updateStrategy($event)">
  </app-domain-console>

  <div class="workspace">
    <!-- View Switcher Tabs -->
    <div class="view-tabs">
      <button
        class="view-tab"
        [class.active]="viewMode() === 'ssm'"
        (click)="viewMode.set('ssm')">
        SSM <span class="tab-badge">Active</span>
      </button>
      <button
        class="view-tab"
        [class.active]="viewMode() === 'taskStructure'"
        (click)="viewMode.set('taskStructure')">
        Task Structure <span class="tab-badge">Grammar</span>
      </button>
      <button
        class="view-tab"
        [class.active]="viewMode() === 'knowledgeBase'"
        (click)="viewMode.set('knowledgeBase')">
        Knowledge Base <span class="tab-badge">Library</span>
      </button>
    </div>

    <!-- SSM View (primary interactive workspace) -->
    <div class="graph-container" *ngIf="viewMode() === 'ssm'">
      <app-ssm-graph
        [nodes]="vm.ssm.nodes"
        [edges]="vm.ssm.edges"
        [activeGoal]="vm.activeGoal"
        [selectedNodeId]="vm.selectedNodeId"
        [highlightNodeId]="highlightNodeId"
        [typeColorMap]="(typeColorMap$ | async) ?? emptyColorMap"
        (onNodeClick)="handleNodeClick($event)">
      </app-ssm-graph>
    </div>

    <!-- Task Structure View -->
    <div class="graph-container" *ngIf="viewMode() === 'taskStructure'">
      <ng-container *ngIf="relations$ | async as relations">
        <app-ssm-graph
          [nodes]="taskStructureToGraph(vm.entityTypes, relations).nodes"
          [edges]="taskStructureToGraph(vm.entityTypes, relations).edges"
          [activeGoal]="null"
          [selectedNodeId]="null"
          [highlightNodeId]="getHighlightType(vm) ? 'ts_' + getHighlightType(vm) : null"
          [typeColorMap]="(typeColorMap$ | async) ?? emptyColorMap"
          (onNodeClick)="handleNodeClick($event)">
        </app-ssm-graph>
      </ng-container>
    </div>

    <!-- Knowledge Base View -->
    <div class="graph-container" *ngIf="viewMode() === 'knowledgeBase'">
      <ng-container *ngIf="fragments$ | async as fragments">
        <app-ssm-graph
          [nodes]="kbToGraph(fragments).nodes"
          [edges]="kbToGraph(fragments).edges"
          [activeGoal]="null"
          [selectedNodeId]="null"
          [highlightNodeId]="vm.activeGoal ? 'kb_' + vm.activeGoal.anchorLabel : null"
          [typeColorMap]="(typeColorMap$ | async) ?? emptyColorMap"
          (onNodeClick)="handleNodeClick($event)">
        </app-ssm-graph>
      </ng-container>
    </div>

    <app-inquiry-overlay
      [engineState]="vm.engineState"
      [pendingNode]="(pendingFindingNode$ | async)"
      (onResolve)="handleResolve($event)">
    </app-inquiry-overlay>
  </div>

  <div class="right-sidebar">
    <div class="right-upper">
      <app-node-inspector
        [selectedNode]="getSelectedNode(vm)"
        [edges]="vm.ssm.edges"
        [nodes]="vm.ssm.nodes"
        (onClearSelection)="facade.selectNode(null)"
        (onNodeLinkClick)="facade.selectNode($event)">
      </app-node-inspector>
      <app-differential-panel
        [entries]="vm.differential">
      </app-differential-panel>
    </div>
    <div class="right-lower">
      <app-audit-trail
        [steps]="(renderedSteps$ | async) ?? []"
        [allSteps]="(recentSteps$ | async) ?? []"
        [scrollToNodeId]="scrollToNodeId"
        (onStepClick)="handleStepClick($event)">
      </app-audit-trail>
    </div>
  </div>

  <app-status-bar
    class="status-bar"
    [engineState]="vm.engineState"
    [nodeCount]="vm.ssm.nodes.length"
    [edgeCount]="vm.ssm.edges.length"
    [pacerDelay]="vm.strategy.pacerDelay">
  </app-status-bar>
</ng-container>
