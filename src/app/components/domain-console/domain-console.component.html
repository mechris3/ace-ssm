<button class="collapse-toggle" (click)="toggleCollapse()">
  {{ collapsed ? '▶' : '◀' }}
</button>

<div class="console-content" [class.hidden]="collapsed">
  <h3 class="section-title">Domain</h3>
  <textarea [(ngModel)]="domainJson" placeholder="Paste Domain JSON..." rows="8"></textarea>
  <div class="btn-row">
    <button class="btn" (click)="loadDomain()">Load Domain</button>
    <button class="btn btn-save" (click)="saveDomain()">Save Session</button>
  </div>
  <div class="error" *ngIf="domainError">{{ domainError }}</div>

  <h3 class="section-title">Seed Finding</h3>
  <div class="seed-form">
    <input type="text" [(ngModel)]="seedLabel" placeholder="Finding label" />
    <select [(ngModel)]="seedType">
      <option value="" disabled>Type</option>
      <option *ngFor="let t of entityTypes" [value]="t">{{ t }}</option>
    </select>
    <button class="btn" (click)="addSeedFinding()">Add</button>
  </div>

  <div class="toggle-row">
    <label>
      <input type="checkbox" [checked]="resetOnLoad" (change)="toggleResetOnLoad()" />
      Reset on Load
    </label>
  </div>

  <hr class="divider" />

  <app-strategy-panel [weights]="weights" (onWeightsChange)="onWeightsChange.emit($event)"></app-strategy-panel>
</div>
